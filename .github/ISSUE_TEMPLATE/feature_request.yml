name: Feature request
description: Suggest a focused improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the smallest useful version first. Larger roadmap ideas can go into `docs/optimization-options.md`.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, maintainer, fork, or agent problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact areas
      options:
        - label: Forkability
        - label: Accessibility
        - label: Security or privacy
        - label: Performance
        - label: Developer experience
        - label: Documentation
